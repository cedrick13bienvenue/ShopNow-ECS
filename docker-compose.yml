services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shopnow
      POSTGRES_PASSWORD: shopnow
      POSTGRES_DB: shopnow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shopnow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnow -d shopnow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - shopnow_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth_service:
    build:
      context: ./auth_service
    ports:
      - "3001:3001"
    env_file:
      - ./default.env
    environment:
      DB_NAME: shopnow_auth
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      shopnow_network:
        aliases:
          - auth-service.shopnow.local

  product_service:
    build:
      context: ./product_service
    ports:
      - "3002:3002"
    env_file:
      - ./default.env
    environment:
      DB_NAME: shopnow_products
      PORT: "3002"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      shopnow_network:
        aliases:
          - product-service.shopnow.local

  cart_service:
    build:
      context: ./cart_service
    ports:
      - "3003:3003"
    env_file:
      - ./default.env
    environment:
      PORT: "3003"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      shopnow_network:
        aliases:
          - cart-service.shopnow.local

  order_service:
    build:
      context: ./order_service
    ports:
      - "3004:3004"
    env_file:
      - ./default.env
    environment:
      DB_NAME: shopnow_orders
      CART_SERVICE_URL: http://cart-service.shopnow.local:3003
      PORT: "3004"
    depends_on:
      postgres:
        condition: service_healthy
      cart_service:
        condition: service_started
    networks:
      shopnow_network:
        aliases:
          - order-service.shopnow.local

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - auth_service
      - product_service
      - cart_service
      - order_service
    networks:
      - shopnow_network

networks:
  shopnow_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
