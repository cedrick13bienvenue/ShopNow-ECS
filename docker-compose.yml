services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shopnow
      POSTGRES_PASSWORD: shopnow
      POSTGRES_DB: shopnow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shopnow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnow -d shopnow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - shopnow_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth_service:
    build:
      context: ./auth_service
    ports:
      - "${PORT_AUTH}:${PORT_AUTH}"
    env_file:
      - ./default.env
    environment:
      DB_NAME: ${DB_NAME_AUTH}
      PORT: ${PORT_AUTH}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      shopnow_network:
        aliases:
          - auth-service.shopnow.local

  product_service:
    build:
      context: ./product_service
    ports:
      - "${PORT_PRODUCT}:${PORT_PRODUCT}"
    env_file:
      - ./default.env
    environment:
      DB_NAME: ${DB_NAME_PRODUCTS}
      PORT: ${PORT_PRODUCT}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      shopnow_network:
        aliases:
          - product-service.shopnow.local

  cart_service:
    build:
      context: ./cart_service
    ports:
      - "${PORT_CART}:${PORT_CART}"
    env_file:
      - ./default.env
    environment:
      PORT: ${PORT_CART}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      shopnow_network:
        aliases:
          - cart-service.shopnow.local

  order_service:
    build:
      context: ./order_service
    ports:
      - "${PORT_ORDER}:${PORT_ORDER}"
    env_file:
      - ./default.env
    environment:
      DB_NAME: ${DB_NAME_ORDERS}
      CART_SERVICE_URL: http://cart-service.shopnow.local:${PORT_CART}
      PORT: ${PORT_ORDER}
    depends_on:
      postgres:
        condition: service_healthy
      cart_service:
        condition: service_started
    networks:
      shopnow_network:
        aliases:
          - order-service.shopnow.local

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - auth_service
      - product_service
      - cart_service
      - order_service
    networks:
      - shopnow_network

networks:
  shopnow_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
