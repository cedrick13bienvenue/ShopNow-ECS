apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: shopnow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: shopnow/cart-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: PORT_CART
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: REDIS_PORT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopnow-secret
                  key: JWT_SECRET
