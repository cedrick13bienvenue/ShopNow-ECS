apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: shopnow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: shopnow/auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: PORT_AUTH
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: shopnow-config
                  key: DB_NAME_AUTH
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopnow-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopnow-secret
                  key: JWT_SECRET
