server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/auth {
        proxy_pass http://auth-service.shopnow.local:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/products {
        proxy_pass http://product-service.shopnow.local:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20m;
    }

    location ^~ /uploads {
        proxy_pass http://product-service.shopnow.local:3002/uploads;
        proxy_set_header Host $host;
    }

    location /api/cart {
        proxy_pass http://cart-service.shopnow.local:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/orders {
        proxy_pass http://order-service.shopnow.local:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
